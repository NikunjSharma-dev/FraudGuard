services:
  # 1. Database (Persistent Storage)
  postgres:
    image: postgres:16-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frauddb}
      POSTGRES_USER: ${POSTGRES_USER:-frauduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraudpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frauduser} -d ${POSTGRES_DB:-frauddb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache (In-memory Feature Store)
  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fraud_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Explicitly set the variables your code is crashing on
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-frauduser}:${POSTGRES_PASSWORD:-fraudpass}@postgres:5432/${POSTGRES_DB:-frauddb}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:8501,http://streamlit:8501"
      SECRET_KEY: "change-me-to-something-secure"
      ENV: "development"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: always

  # 4. Streamlit Dashboard
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: fraud_streamlit
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000 # Streamlit connects to the backend container
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app
    restart: always

volumes:
  postgres_data:
  redis_data: